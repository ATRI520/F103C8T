; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; CubeMX places application sources under Core/Src (PlatformIO defaults to src/).
[platformio]
src_dir = Core/Src
include_dir = Core/Inc

[env:genericSTM32F103C8]
platform = ststm32
board = genericSTM32F103C8
framework = stm32cube
; newlib-nano needs this or printf with %f may print nothing / misbehave
build_flags = -Wl,-u,_printf_float
upload_protocol = stlink
debug_speed = 400
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
; CH340/CP2102 often pulse DTR/RTS when opening the port — MCU resets mid-print => mojibake.
monitor_dtr = 0
monitor_rts = 0
; Replace OpenOCD "verify reset" with "verify resume" to avoid reset failure at end.
extra_scripts = post:scripts/pio_openocd_upload.py